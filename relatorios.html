<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatórios - EstoquePro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="relatorios.css?v=1.2">
    <link rel="stylesheet" href="menu.css?v=1.2">
</head>
<body>
<script type="module">
        // A proteção de rota agora é tratada centralmente pelo menu.js
    </script>

    <div class="sidebar">
        <div class="logo">🍔 EstoquePro</div>
        <div class="menu-item" onclick="window.location.href='dashboard.html'">🏠 Dashboard</div>
        <div class="menu-item" onclick="window.location.href='setores.html'">🗂️ Setores</div>
        <div class="menu-item" onclick="window.location.href='produtos.html'">📦 Produtos</div>
        <div class="menu-item" onclick="window.location.href='compras.html'">🛒 Compras</div>
        <div class="menu-item" onclick="window.location.href='estoque.html'">📊 Estoque</div>
        <div class="menu-item" onclick="window.location.href='relatorios.html'">📑 Relatórios</div>
        <div class="menu-item" onclick="window.location.href='assinatura.html'">⭐ Assinatura</div>
        <div class="menu-item" onclick="logout()">🚪 Sair</div>
    </div>
    <div class="hamburger-menu">
        <span></span>
        <span></span>
        <span></span>
    </div>

    <div class="main">
        <h1>Relatórios de Consumo</h1>

        <div class="filters">
            <input type="date" id="startDate">
            <input type="date" id="endDate">
            <select id="setorSelect">
                <option value="">Todos os Setores</option>
            </select>
            <select id="produtoSelect">
                <option value="">Todos os Produtos</option>
            </select>
            <button onclick="filtrarRelatorio()">Filtrar</button>
        </div>

        <div class="chart-container">
            <canvas id="consumptionChart"></canvas>
        </div>

        <div class="ai-assistant-button" onclick="toggleAIChat()">
        IA Assistant
    </div>

    <div class="ai-assistant-chat">
        <div class="ai-assistant-header">
            <h2>IA Assistant</h2>
            <span class="ai-assistant-close" onclick="toggleAIChat()">&times;</span>
        </div>
        <div class="ai-assistant-body">
            <div id="ai-conversation"></div>
            <div class="ai-assistant-footer">
                <input type="text" id="ai-input" placeholder="Pergunte-me algo...">
                <button onclick="askAI()">Enviar</button>
            </div>
        </div>
    </div>
    </div>

    <script type="module">
        import { getEffectiveUid } from './menu.js';
        import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyCkwsmbR683PMT1XoOyEykqJmLCcieQwwU",
            authDomain: "controle-de-estoque-fac87.firebaseapp.com",
            projectId: "controle-de-estoque-fac87",
            storageBucket: "controle-de-estoque-fac87.firebasestorage.app",
            messagingSenderId: "931385340836",
            appId: "1:931385340836:web:ed3cb1d560127b739b8731"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        let effectiveUid = null;
        let consumptionChart = null;

        async function initializePage() {
            try {
                effectiveUid = await getEffectiveUid();
                loadFilters();
                filtrarRelatorio();
            } catch (error) {
                console.error("Erro ao inicializar página de relatórios:", error);
            }
        }
        initializePage();


        async function loadFilters() {
            const q = query(collection(db, "produtos"), where("restaurante", "==", effectiveUid));
            const querySnapshot = await getDocs(q);
            const setores = new Set();
            const produtos = [];
            querySnapshot.forEach((doc) => {
                const data = doc.data();
                setores.add(data.setor);
                produtos.push(data.nome);
            });

            const setorSelect = document.getElementById('setorSelect');
            setores.forEach(setor => {
                const option = new Option(setor, setor);
                setorSelect.add(option);
            });

            const produtoSelect = document.getElementById('produtoSelect');
            produtos.sort().forEach(produto => {
                const option = new Option(produto, produto);
                produtoSelect.add(option);
            });
        }

        window.filtrarRelatorio = async function() {
            if (!effectiveUid) return; // Não executa se o UID ainda não estiver pronto

            let comprasQuery = query(collection(db, "compras"), where("restaurante", "==", effectiveUid));
            // ... (restante da função é a mesma, apenas usando effectiveUid)
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;
            const setor = document.getElementById('setorSelect').value;
            const produto = document.getElementById('produtoSelect').value;

            if (startDate) comprasQuery = query(comprasQuery, where("data", ">=", startDate));
            if (endDate) comprasQuery = query(comprasQuery, where("data", "<=", endDate));
            if (setor) comprasQuery = query(comprasQuery, where("setor", "==", setor));
            if (produto) comprasQuery = query(comprasQuery, where("produto", "==", produto));
            
            const comprasSnapshot = await getDocs(comprasQuery);
            const compras = {};
            comprasSnapshot.forEach(doc => {
                const data = doc.data();
                compras[data.produto] = (compras[data.produto] || 0) + data.quantidade;
            });
            
            let contagemQuery = query(collection(db, "contagemEstoque"), where("restaurante", "==", effectiveUid));
            if (startDate) contagemQuery = query(contagemQuery, where("data", ">=", startDate));
            if (endDate) contagemQuery = query(contagemQuery, where("data", "<=", endDate));
            if (setor) contagemQuery = query(contagemQuery, where("setor", "==", setor));
            if (produto) contagemQuery = query(contagemQuery, where("produto", "==", produto));

            const contagemSnapshot = await getDocs(contagemQuery);
            const contagensIniciais = {};
            const contagensFinais = {};
            
            contagemSnapshot.forEach(doc => {
                const data = doc.data();
                if (!contagensIniciais[data.produto]) {
                    contagensIniciais[data.produto] = { data: data.data, quantidade: data.quantidade };
                }
                contagensFinais[data.produto] = { data: data.data, quantidade: data.quantidade };
            });

            const consumption = {};
            const allProducts = new Set([...Object.keys(compras), ...Object.keys(contagensIniciais), ...Object.keys(contagensFinais)]);

            allProducts.forEach(p => {
                const initial = contagensIniciais[p]?.quantidade || 0;
                const purchase = compras[p] || 0;
                const final = contagensFinais[p]?.quantidade || 0;
                consumption[p] = (initial + purchase) - final;
            });
            
            renderChart(consumption);
        }

        function renderChart(data) {
            const ctx = document.getElementById('consumptionChart').getContext('2d');
            if (consumptionChart) {
                consumptionChart.destroy();
            }
            consumptionChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: Object.keys(data),
                    datasets: [{
                        label: 'Consumo (Unidades)',
                        data: Object.values(data),
                        backgroundColor: 'rgba(255, 140, 0, 0.7)',
                        borderColor: 'rgba(255, 140, 0, 1)',
                        borderWidth: 1
                    }]
                },
                options: { scales: { y: { beginAtZero: true } } }
            });
        }

        window.askAI = function() { /* ... (código da IA inalterado) ... */ };
        window.toggleAIChat = function() { /* ... (código da IA inalterado) ... */ };
    </script>
    <script src="menu.js" type="module"></script>
</body>
</html>
