<!-- CONTEÚDO -->

<div class="main">

<div class="card">

<h2>Contagem de Estoque</h2>

<input type="date" id="data">

<input type="text" id="responsavel" placeholder="Responsável pela contagem">

<select id="setorSelect">
<option value="">Selecione o setor</option>
</select>

<div id="listaProdutos"></div>

<button onclick="salvarContagem()">Salvar Contagem</button>

</div>

<div class="card">
    <h2>Histórico de Contagens</h2>
    <div id="historicoContagens">
        <!-- O histórico será carregado aqui -->
    </div>
</div>

</div>

<script type="module">

// Importa a função para obter o UID efetivo (do dono da conta)
import { getEffectiveUid } from './menu.js'; 

import { getFirestore, collection, getDocs, addDoc, query, where, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";

// A configuração do Firebase é necessária para os serviços do Firestore
const firebaseConfig = {
    apiKey: "AIzaSyCkwsmbR683PMT1XoOyEykqJmLCcieQwwU",
    authDomain: "controle-de-estoque-fac87.firebaseapp.com",
    projectId: "controle-de-estoque-fac87",
    storageBucket: "controle-de-estoque-fac87.firebasestorage.app",
    messagingSenderId: "931385340836",
    appId: "1:931385340836:web:ed3cb1d560127b739b8731"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let effectiveUid = null;

// Seta a data atual no campo de data
document.getElementById("data").value = new Date().toISOString().split('T')[0];

// Inicializa a página assim que o UID efetivo estiver disponível
async function initializePage() {
    try {
        effectiveUid = await getEffectiveUid();
        carregarSetores();
        carregarHistorico();
    } catch (error) {
        console.error("Erro na inicialização da página de estoque:", error);
        // O redirecionamento já é feito pelo menu.js se não estiver logado
    }
}

initializePage();


// Carrega os setores disponíveis para o usuário
async function carregarSetores() {
    const q = query(
        collection(db, "produtos"),
        where("restaurante", "==", effectiveUid)
    );
    const querySnapshot = await getDocs(q);
    const setores = new Set();
    querySnapshot.forEach((doc) => {
        setores.add(doc.data().setor.trim().toLowerCase());
    });

    const select = document.getElementById("setorSelect");
    select.innerHTML = '<option value="">Selecione o setor</option>';
    setores.forEach((setor) => {
        const option = document.createElement("option");
        option.value = setor;
        option.text = setor.charAt(0).toUpperCase() + setor.slice(1);
        select.appendChild(option);
    });
}

// Carrega os produtos baseados no setor selecionado
document.getElementById("setorSelect").addEventListener("change", async function() {
    const setorSelecionado = this.value;
    const lista = document.getElementById("listaProdutos");
    lista.innerHTML = "";

    if (!setorSelecionado) return;

    const q = query(
        collection(db, "produtos"),
        where("restaurante", "==", effectiveUid),
        where("setor", "==", setorSelecionado)
    );
    const querySnapshot = await getDocs(q);
    const produtos = [];
    querySnapshot.forEach((doc) => {
        produtos.push(doc.data().nome);
    });

    produtos.sort();

    produtos.forEach((produtoNome) => {
        const div = document.createElement("div");
        div.className = "produto";
        div.innerHTML = `
            <span>${produtoNome}</span>
            <input type="number" data-produto="${produtoNome}" placeholder="0" min="0">
        `;
        lista.appendChild(div);
    });
});

// Salva a contagem de estoque como um documento único
window.salvarContagem = async function() {
    const data = document.getElementById("data").value;
    const responsavel = document.getElementById("responsavel").value.trim();
    const setor = document.getElementById("setorSelect").value;

    if (!data || !responsavel || !setor) {
        alert("Por favor, preencha a data, o responsável e selecione um setor.");
        return;
    }

    const inputs = document.querySelectorAll("#listaProdutos input");
    const produtosContados = [];
    inputs.forEach(input => {
        const quantidade = Number(input.value);
        if (quantidade > 0) {
            produtosContados.push({
                nome: input.dataset.produto,
                quantidade: quantidade
            });
        }
    });

    if (produtosContados.length === 0) {
        alert("Nenhum produto com quantidade foi preenchido. Nada foi salvo.");
        return;
    }

    try {
        await addDoc(collection(db, "contagens"), {
            data: data,
            responsavel: responsavel,
            setor: setor,
            restaurante: effectiveUid, // Usa o UID efetivo
            produtos: produtosContados
        });

        alert("Contagem salva com sucesso!");
        
        document.getElementById("responsavel").value = '';
        document.getElementById("setorSelect").value = '';
        document.getElementById("listaProdutos").innerHTML = '';
        
        carregarHistorico();

    } catch (error) {
        console.error("Erro ao salvar contagem: ", error);
        alert("Ocorreu um erro ao salvar a contagem.");
    }
}

// Carrega e exibe o histórico de contagens
async function carregarHistorico() {
    const historicoDiv = document.getElementById("historicoContagens");
    historicoDiv.innerHTML = "Carregando...";

    const q = query(
        collection(db, "contagens"),
        where("restaurante", "==", effectiveUid), // Usa o UID efetivo
        orderBy("data", "desc")
    );

    try {
        const querySnapshot = await getDocs(q);
        if (querySnapshot.empty) {
            historicoDiv.innerHTML = "<p>Nenhuma contagem registrada ainda.</p>";
            return;
        }

        historicoDiv.innerHTML = "";
        querySnapshot.forEach(doc => {
            const contagem = doc.data();
            const [ano, mes, dia] = contagem.data.split('-');
            const dataFormatada = `${dia}/${mes}/${ano}`;
            const contagemCard = document.createElement("div");
            contagemCard.className = "contagem-card";
            let produtosHtml = contagem.produtos.map(p => `<li>${p.nome}: ${p.quantidade}</li>`).join('');
            contagemCard.innerHTML = `
                <h4>Data: ${dataFormatada}</h4>
                <p><strong>Responsável:</strong> ${contagem.responsavel}</p>
                <p><strong>Setor:</strong> ${contagem.setor}</p>
                <ul>${produtosHtml}</ul>
            `;
            historicoDiv.appendChild(contagemCard);
        });
    } catch (error) {
        console.error("Erro ao carregar histórico: ", error);
        historicoDiv.innerHTML = "<p>Erro ao carregar o histórico.</p>";
    }
}

</script>
