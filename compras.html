<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Compras - EstoquePro</title>

<link rel="stylesheet" href="compras.css?v=1.2">
<link rel="stylesheet" href="menu.css?v=1.2">

</head>

<body>

    <div class="sidebar">
        <div class="logo">🍔 EstoquePro</div>
        <div class="menu-item" onclick="window.location.href='dashboard.html'">🏠 Dashboard</div>
        <div class="menu-item" onclick="window.location.href='setores.html'">🗂️ Setores</div>
        <div class="menu-item" onclick="window.location.href='produtos.html'">📦 Produtos</div>
        <div class="menu-item" onclick="window.location.href='compras.html'">🛒 Compras</div>
        <div class="menu-item" onclick="window.location.href='estoque.html'">📊 Estoque</div>
        <div class="menu-item" onclick="window.location.href='relatorios.html'">📑 Relatórios</div>
        <div class="menu-item" onclick="window.location.href='assinatura.html'">⭐ Assinatura</div>
        <div class="menu-item" onclick="logout()">🚪 Sair</div>
    </div>
    <div class="hamburger-menu">
        <span></span>
        <span></span>
        <span></span>
    </div>

<!-- CONTEÚDO -->

<div class="main">

<div class="card">

<h2>Registrar Compra</h2>

<select id="setorSelect">
<option value="">Selecione o setor</option>
</select>

<select id="produtoSelect">
<option value="">Selecione o produto</option>
</select>

<input type="number" id="quantidade" placeholder="Quantidade">

<input type="text" id="fornecedor" placeholder="Fornecedor">

<input type="date" id="dataCompra">

<button onclick="registrarCompra()">Salvar Compra</button>

</div>

<!-- HISTORICO -->

<div class="historico">

<h3>Últimas Compras</h3>

<div id="listaCompras"></div>

</div>

</div>

<script type="module">

import { getEffectiveUid } from './menu.js';
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc, query, where, orderBy, limit, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyCkwsmbR683PMT1XoOyEykqJmLCcieQwwU",
    authDomain: "controle-de-estoque-fac87.firebaseapp.com",
    projectId: "controle-de-estoque-fac87",
    storageBucket: "controle-de-estoque-fac87.firebasestorage.app",
    messagingSenderId: "931385340836",
    appId: "1:931385340836:web:ed3cb1d560127b739b8731"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let effectiveUid = null;

// Seta a data atual como padrão
document.getElementById("dataCompra").value = new Date().toISOString().split('T')[0];

async function initializePage() {
    try {
        effectiveUid = await getEffectiveUid();
        carregarSetores();
        carregarHistorico();
    } catch (error) {
        console.error("Erro ao inicializar página de compras:", error);
    }
}
initializePage();


async function carregarSetores() {
    if (!effectiveUid) return;
    const q = query(collection(db, "produtos"), where("restaurante", "==", effectiveUid));
    const querySnapshot = await getDocs(q);
    const setores = new Set();
    querySnapshot.forEach((doc) => {
        setores.add(doc.data().setor);
    });

    const select = document.getElementById("setorSelect");
    setores.forEach((setor) => {
        const option = new Option(setor, setor);
        select.appendChild(option);
    });
}

document.getElementById("setorSelect").addEventListener("change", async function () {
    if (!effectiveUid) return;
    const setorSelecionado = this.value;
    const produtoSelect = document.getElementById("produtoSelect");
    produtoSelect.innerHTML = '<option value="">Selecione o produto</option>';

    const q = query(
        collection(db, "produtos"),
        where("restaurante", "==", effectiveUid),
        where("setor", "==", setorSelecionado)
    );
    const querySnapshot = await getDocs(q);
    const produtos = [];
    querySnapshot.forEach((doc) => {
        produtos.push(doc.data().nome);
    });

    produtos.sort().forEach((nome) => {
        const option = new Option(nome, nome);
        produtoSelect.appendChild(option);
    });
});

window.registrarCompra = async function () {
    if (!effectiveUid) return;
    const setor = document.getElementById("setorSelect").value;
    const produto = document.getElementById("produtoSelect").value;
    const quantidade = document.getElementById("quantidade").value;
    const fornecedor = document.getElementById("fornecedor").value;
    const data = document.getElementById("dataCompra").value;

    if (!produto || !quantidade) {
        alert("Preencha produto e quantidade.");
        return;
    }

    await addDoc(collection(db, "compras"), {
        setor: setor,
        produto: produto,
        quantidade: Number(quantidade),
        fornecedor: fornecedor,
        data: data,
        restaurante: effectiveUid,
        criado: serverTimestamp()
    });

    alert("Compra registrada!");
    document.getElementById("quantidade").value = "";
    document.getElementById("fornecedor").value = "";
    carregarHistorico();
}

async function carregarHistorico() {
    if (!effectiveUid) return;
    const q = query(
        collection(db, "compras"),
        where("restaurante", "==", effectiveUid),
        orderBy("criado", "desc"),
        limit(10)
    );
    const querySnapshot = await getDocs(q);
    let html = "";
    querySnapshot.forEach((doc) => {
        let c = doc.data();
        html += `
        <div class="item-historico">
            <b>${c.produto}</b> — ${c.quantidade}<br>
            Fornecedor: ${c.fornecedor || "Não informado"}<br>
            Data: ${c.data}
        </div>`;
    });
    document.getElementById("listaCompras").innerHTML = html;
}

</script>
<script src="menu.js" type="module"></script>
</body>

</html>
