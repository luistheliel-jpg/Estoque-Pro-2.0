<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assinatura Confirmada - EstoquePro</title>
    <link rel="stylesheet" href="checkout.css">
</head>
<body>
    <div class="checkout-container">
        <div class="checkout-card">
            <div class="logo">🍔 EstoquePro</div>

            <div class="status-icon success-icon">✔</div>
            <h2 class="status-title">Assinatura confirmada!</h2>
            <p class="status-msg">Seu Plano Pro está sendo ativado. Em instantes você terá acesso completo.</p>

            <button id="portal-btn" onclick="abrirPortal()">Gerenciar cobrança</button>
            <a class="back-link" href="dashboard.html">Ir para o Dashboard</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFunctions, httpsCallable } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-functions.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCkwsmbR683PMT1XoOyEykqJmLCcieQwwU",
            authDomain: "controle-de-estoque-fac87.firebaseapp.com",
            projectId: "controle-de-estoque-fac87",
            storageBucket: "controle-de-estoque-fac87.firebasestorage.app",
            messagingSenderId: "931385340836",
            appId: "1:931385340836:web:ed3cb1d560127b739b8731"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const functions = getFunctions(app, "us-central1");

        const sessionId = new URLSearchParams(window.location.search).get("session_id");

        onAuthStateChanged(auth, (user) => {
            if (!user) window.location.href = "index.html";
        });

        window.abrirPortal = async function() {
            const btn = document.getElementById("portal-btn");
            btn.disabled = true;
            btn.textContent = "Abrindo...";
            try {
                const createPortalSession = httpsCallable(functions, "createPortalSession");
                const result = await createPortalSession({
                    sessionId: sessionId,
                    returnUrl: window.location.origin + "/assinatura.html"
                });
                window.location.href = result.data.url;
            } catch (error) {
                console.error("Erro ao abrir portal:", error);
                btn.disabled = false;
                btn.textContent = "Gerenciar cobrança";
                alert("Não foi possível abrir o portal de cobrança.");
            }
        };
    </script>
</body>
</html>
