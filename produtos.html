<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Produtos - EstoquePro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="produtos.css?v=2.0">
    <link rel="stylesheet" href="menu.css?v=1.2">
</head>

<body>

    <div class="sidebar">
        <div class="logo">🍔 EstoquePro</div>
        <div class="menu-item" onclick="window.location.href='dashboard.html'">🏠 Dashboard</div>
        <div class="menu-item" onclick="window.location.href='setores.html'">🗂️ Setores</div>
        <div class="menu-item" onclick="window.location.href='produtos.html'">📦 Produtos</div>
        <div class="menu-item" onclick="window.location.href='compras.html'">🛒 Compras</div>
        <div class="menu-item" onclick="window.location.href='estoque.html'">📊 Estoque</div>
        <div class="menu-item" onclick="window.location.href='relatorios.html'">📑 Relatórios</div>
        <div class="menu-item" onclick="window.location.href='assinatura.html'">⭐ Assinatura</div>
        <div class="menu-item" onclick="logout()">🚪 Sair</div>
    </div>
    <div class="hamburger-menu">
        <span></span>
        <span></span>
        <span></span>
    </div>

    <div class="main">
        <div class="header-row">
            <h1>Produtos</h1>
            <button class="btn-novo" onclick="abrirModal()">+ Novo Produto</button>
        </div>

        <div class="filtro-row">
            <input id="filtroBusca" placeholder="Buscar produto..." oninput="filtrarLista()">
            <select id="filtroSetor" onchange="filtrarLista()">
                <option value="">Todos os setores</option>
            </select>
        </div>

        <div class="lista" id="listaProdutos"></div>
    </div>

    <!-- Modal Novo/Editar Produto -->
    <div id="produtoModal" class="modal">
        <div class="modal-content">
            <span class="close-button" onclick="fecharModal()">&times;</span>
            <h2 id="modalTitulo">Novo Produto</h2>
            <input type="hidden" id="produtoId">

            <label>Nome do Produto *</label>
            <input id="nomeProduto" placeholder="Ex: Frango, Cerveja Long Neck...">

            <label>Fornecedor</label>
            <input id="fornecedorProduto" placeholder="Ex: Distribuidora ABC">

            <label>Categoria *</label>
            <select id="categoriaProduto">
                <option value="">Selecione a categoria</option>
                <optgroup label="Carnes e Proteínas">
                    <option>Frango</option>
                    <option>Carne Bovina</option>
                    <option>Carne Suína</option>
                    <option>Peixe</option>
                    <option>Frutos do Mar</option>
                    <option>Embutidos</option>
                    <option>Ovos</option>
                </optgroup>
                <optgroup label="Frios e Laticínios">
                    <option>Queijo</option>
                    <option>Manteiga / Margarina</option>
                    <option>Iogurte</option>
                    <option>Creme de Leite</option>
                    <option>Leite</option>
                </optgroup>
                <optgroup label="Hortifruti">
                    <option>Verduras e Folhas</option>
                    <option>Legumes</option>
                    <option>Frutas</option>
                    <option>Temperos Frescos</option>
                    <option>Cogumelos</option>
                </optgroup>
                <optgroup label="Padaria e Farináceos">
                    <option>Pão e Bisnaguinha</option>
                    <option>Farinha de Trigo</option>
                    <option>Farinha de Rosca / Panko</option>
                    <option>Massa (Macarrão, Lasanha)</option>
                    <option>Arroz</option>
                    <option>Feijão e Grãos</option>
                    <option>Açúcar</option>
                    <option>Sal</option>
                </optgroup>
                <optgroup label="Óleos, Molhos e Condimentos">
                    <option>Óleo / Azeite</option>
                    <option>Vinagre</option>
                    <option>Molho de Tomate</option>
                    <option>Ketchup / Mostarda / Maionese</option>
                    <option>Shoyu / Molho de Pimenta</option>
                    <option>Tempero em Pó / Especiarias</option>
                </optgroup>
                <optgroup label="Bebidas">
                    <option>Cerveja</option>
                    <option>Refrigerante</option>
                    <option>Água</option>
                    <option>Suco / Néctar</option>
                    <option>Vinho</option>
                    <option>Destilados (Vodka, Rum, Cachaça...)</option>
                    <option>Energético</option>
                    <option>Café / Chá</option>
                </optgroup>
                <optgroup label="Congelados e Semiprontos">
                    <option>Batata Frita / Congelados</option>
                    <option>Pizza Congelada</option>
                    <option>Sorvete / Açaí</option>
                    <option>Pré-mistura</option>
                </optgroup>
                <optgroup label="Descartáveis e Embalagens">
                    <option>Copo Descartável</option>
                    <option>Embalagem para Delivery</option>
                    <option>Guardanapo / Canudo</option>
                    <option>Sacola / Saco Plástico</option>
                    <option>Papel Toalha / Alumínio</option>
                </optgroup>
                <optgroup label="Limpeza e Higiene">
                    <option>Detergente / Sabão</option>
                    <option>Desinfetante / Álcool</option>
                    <option>Esponja / Pano de Limpeza</option>
                    <option>Luva Descartável</option>
                    <option>Papel Higiênico</option>
                </optgroup>
                <optgroup label="Outros">
                    <option>Gelo</option>
                    <option>Carvão / Gás</option>
                    <option>Outros</option>
                </optgroup>
            </select>

            <label>Unidade de Medida *</label>
            <select id="unidadeProduto">
                <option value="">Selecione a unidade</option>
                <optgroup label="Por Peso">
                    <option value="kg">Quilograma (kg)</option>
                    <option value="g">Grama (g)</option>
                </optgroup>
                <optgroup label="Por Volume">
                    <option value="litro">Litro (L)</option>
                    <option value="ml">Mililitro (ml)</option>
                    <option value="garrafa">Garrafa</option>
                    <option value="lata">Lata</option>
                </optgroup>
                <optgroup label="Por Unidade/Pacote">
                    <option value="unidade">Unidade (un)</option>
                    <option value="pacote">Pacote</option>
                    <option value="caixa">Caixa</option>
                    <option value="fardo">Fardo</option>
                    <option value="duzia">Dúzia</option>
                    <option value="saco">Saco</option>
                    <option value="porcao">Porção</option>
                </optgroup>
            </select>

            <label>Setor *</label>
            <select id="setorProduto">
                <option value="">Selecione o setor</option>
            </select>

            <div class="form-row">
                <div class="form-group">
                    <label>Estoque Atual</label>
                    <input type="number" id="estoqueAtual" placeholder="0" min="0">
                </div>
                <div class="form-group">
                    <label>Estoque Mínimo</label>
                    <input type="number" id="estoqueMinimo" placeholder="0" min="0">
                </div>
            </div>

            <label>Custo Unitário (R$)</label>
            <input type="number" id="custoUnitario" placeholder="0,00" min="0" step="0.01">

            <button onclick="salvarProduto()">Salvar Produto</button>
        </div>
    </div>

    <script type="module">
        import { getEffectiveUid } from './menu.js';
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, where, getDocs, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCkwsmbR683PMT1XoOyEykqJmLCcieQwwU",
            authDomain: "controle-de-estoque-fac87.firebaseapp.com",
            projectId: "controle-de-estoque-fac87",
            storageBucket: "controle-de-estoque-fac87.firebasestorage.app",
            messagingSenderId: "931385340836",
            appId: "1:931385340836:web:ed3cb1d560127b739b8731"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let effectiveUid = null;
        let todosProdutos = [];

        async function initializePage() {
            try {
                effectiveUid = await getEffectiveUid();
                await carregarSetoresFiltro();
                await carregarProdutos();
            } catch (error) {
                console.error("Erro ao inicializar produtos:", error);
            }
        }
        initializePage();

        async function carregarSetoresFiltro() {
            const q = query(collection(db, "setores"), where("restaurante", "==", effectiveUid));
            const snap = await getDocs(q);
            const filtroSetor = document.getElementById("filtroSetor");
            filtroSetor.innerHTML = '<option value="">Todos os setores</option>';
            snap.forEach(d => {
                const opt = new Option(d.data().nome, d.data().nome);
                filtroSetor.appendChild(opt);
            });
        }

        async function carregarSetoresModal() {
            const q = query(collection(db, "setores"), where("restaurante", "==", effectiveUid));
            const snap = await getDocs(q);
            const sel = document.getElementById("setorProduto");
            sel.innerHTML = '<option value="">Selecione o setor</option>';
            snap.forEach(d => {
                const opt = new Option(d.data().nome, d.data().nome);
                sel.appendChild(opt);
            });
        }

        async function carregarProdutos() {
            if (!effectiveUid) return;
            const q = query(collection(db, "produtos"), where("restaurante", "==", effectiveUid));
            const snap = await getDocs(q);
            todosProdutos = [];
            snap.forEach(d => todosProdutos.push({ id: d.id, ...d.data() }));
            renderizarLista(todosProdutos);
        }

        function renderizarLista(produtos) {
            const lista = document.getElementById("listaProdutos");
            if (produtos.length === 0) {
                lista.innerHTML = '<p class="vazio">Nenhum produto encontrado. Clique em "+ Novo Produto" para começar.</p>';
                return;
            }

            const porSetor = {};
            produtos.forEach(p => {
                const setor = p.setor || 'Sem Setor';
                if (!porSetor[setor]) porSetor[setor] = [];
                porSetor[setor].push(p);
            });

            let html = "";
            Object.keys(porSetor).sort().forEach(setor => {
                html += `<div class="setor-grupo"><div class="setor-titulo">${setor}</div>`;
                porSetor[setor].forEach(p => {
                    const baixo = p.estoqueAtual !== undefined && p.estoqueMinimo !== undefined && Number(p.estoqueAtual) <= Number(p.estoqueMinimo);
                    html += `
                    <div class="item ${baixo ? 'estoque-baixo' : ''}">
                        <div class="item-info">
                            <div class="item-nome">${p.nome} ${baixo ? '<span class="badge-baixo">Estoque Baixo</span>' : ''}</div>
                            <div class="item-detalhe">
                                <span>${p.categoria || ''}</span>
                                <span>${p.unidade || ''}</span>
                            </div>
                            <div class="item-detalhe">
                                ${p.fornecedor ? `<span>Fornecedor: ${p.fornecedor}</span>` : ''}
                                ${p.estoqueAtual !== undefined ? `<span>Estoque: ${p.estoqueAtual} / Min: ${p.estoqueMinimo || 0}</span>` : ''}
                                ${p.custoUnitario ? `<span>Custo: R$ ${Number(p.custoUnitario).toFixed(2)}</span>` : ''}
                            </div>
                        </div>
                        <div class="item-actions">
                            <button class="btn-edit" onclick="abrirModalEdicao('${p.id}')">Editar</button>
                            <button class="btn-delete" onclick="deletarProduto('${p.id}')">Excluir</button>
                        </div>
                    </div>`;
                });
                html += `</div>`;
            });
            lista.innerHTML = html;
        }

        window.filtrarLista = function() {
            const busca = document.getElementById("filtroBusca").value.toLowerCase();
            const setor = document.getElementById("filtroSetor").value;
            const filtrado = todosProdutos.filter(p => {
                const matchBusca = p.nome.toLowerCase().includes(busca) || (p.categoria || '').toLowerCase().includes(busca);
                const matchSetor = !setor || p.setor === setor;
                return matchBusca && matchSetor;
            });
            renderizarLista(filtrado);
        }

        window.abrirModal = async function() {
            document.getElementById('produtoId').value = '';
            document.getElementById('nomeProduto').value = '';
            document.getElementById('fornecedorProduto').value = '';
            document.getElementById('categoriaProduto').value = '';
            document.getElementById('unidadeProduto').value = '';
            document.getElementById('estoqueAtual').value = '';
            document.getElementById('estoqueMinimo').value = '';
            document.getElementById('custoUnitario').value = '';
            document.getElementById('modalTitulo').textContent = 'Novo Produto';
            await carregarSetoresModal();
            document.getElementById('produtoModal').style.display = 'flex';
        }

        window.abrirModalEdicao = async function(id) {
            const p = todosProdutos.find(x => x.id === id);
            if (!p) return;
            document.getElementById('produtoId').value = id;
            document.getElementById('nomeProduto').value = p.nome || '';
            document.getElementById('fornecedorProduto').value = p.fornecedor || '';
            document.getElementById('estoqueAtual').value = p.estoqueAtual !== undefined ? p.estoqueAtual : '';
            document.getElementById('estoqueMinimo').value = p.estoqueMinimo !== undefined ? p.estoqueMinimo : '';
            document.getElementById('custoUnitario').value = p.custoUnitario || '';
            document.getElementById('modalTitulo').textContent = 'Editar Produto';
            await carregarSetoresModal();
            document.getElementById('categoriaProduto').value = p.categoria || '';
            document.getElementById('unidadeProduto').value = p.unidade || '';
            document.getElementById('setorProduto').value = p.setor || '';
            document.getElementById('produtoModal').style.display = 'flex';
        }

        window.fecharModal = function() {
            document.getElementById('produtoModal').style.display = 'none';
        }

        window.salvarProduto = async function() {
            if (!effectiveUid) return;
            const id = document.getElementById('produtoId').value;
            const nome = document.getElementById('nomeProduto').value.trim();
            const fornecedor = document.getElementById('fornecedorProduto').value.trim();
            const categoria = document.getElementById('categoriaProduto').value;
            const unidade = document.getElementById('unidadeProduto').value;
            const setor = document.getElementById('setorProduto').value;
            const estoqueAtual = document.getElementById('estoqueAtual').value;
            const estoqueMinimo = document.getElementById('estoqueMinimo').value;
            const custoUnitario = document.getElementById('custoUnitario').value;

            if (!nome || !categoria || !unidade || !setor) {
                alert("Nome, categoria, unidade e setor são obrigatórios.");
                return;
            }

            const dados = {
                nome,
                fornecedor,
                categoria,
                unidade,
                setor,
                estoqueAtual: estoqueAtual !== '' ? Number(estoqueAtual) : 0,
                estoqueMinimo: estoqueMinimo !== '' ? Number(estoqueMinimo) : 0,
                custoUnitario: custoUnitario !== '' ? Number(custoUnitario) : 0,
                restaurante: effectiveUid
            };

            if (id) {
                await updateDoc(doc(db, "produtos", id), dados);
            } else {
                await addDoc(collection(db, "produtos"), dados);
            }

            fecharModal();
            await carregarProdutos();
        }

        window.deletarProduto = async function(id) {
            if (confirm("Excluir este produto?")) {
                await deleteDoc(doc(db, "produtos", id));
                await carregarProdutos();
            }
        }

        window.addEventListener('click', function(e) {
            const modal = document.getElementById('produtoModal');
            if (e.target === modal) fecharModal();
        });
    </script>
    <script src="menu.js" type="module"></script>
</body>
</html>
