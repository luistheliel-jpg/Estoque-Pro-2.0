<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assinar Pro - EstoquePro</title>
    <link rel="stylesheet" href="checkout.css">
</head>
<body>
    <div class="checkout-container">
        <div class="checkout-card">
            <div class="logo">🍔 EstoquePro</div>

            <div class="product">
                <div class="product-icon">⭐</div>
                <div class="product-info">
                    <h3>Plano Pro</h3>
                    <span class="price">R$ 99,90 <span class="period">/ mês</span></span>
                </div>
            </div>

            <ul class="features">
                <li>Relatórios Avançados e Gráficos</li>
                <li>Insights com Inteligência Artificial</li>
                <li>Até 4 contas de funcionário</li>
                <li>Suporte prioritário</li>
            </ul>

            <button id="checkout-btn" onclick="irParaCheckout()">
                Assinar agora
            </button>

            <a class="back-link" href="assinatura.html">Voltar</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";
        import { getFunctions, httpsCallable } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-functions.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCkwsmbR683PMT1XoOyEykqJmLCcieQwwU",
            authDomain: "controle-de-estoque-fac87.firebaseapp.com",
            projectId: "controle-de-estoque-fac87",
            storageBucket: "controle-de-estoque-fac87.firebasestorage.app",
            messagingSenderId: "931385340836",
            appId: "1:931385340836:web:ed3cb1d560127b739b8731"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const fns = getFunctions(app, "us-central1");

        let currentUser = null;

        const btn = document.getElementById("checkout-btn");
        btn.disabled = true;
        btn.textContent = "Carregando...";

        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = "index.html";
                return;
            }
            currentUser = user;
            btn.disabled = false;
            btn.textContent = "Assinar agora";
        });

        window.irParaCheckout = async function() {
            if (!currentUser) return;
            btn.disabled = true;
            btn.textContent = "Aguarde...";

            try {
                console.log("UID do usuário:", currentUser.uid);
                const createCheckoutSession = httpsCallable(fns, "createCheckoutSession");
                const result = await createCheckoutSession({
                    baseUrl: window.location.origin
                });
                window.location.href = result.data.url;
            } catch (error) {
                console.error("Erro ao redirecionar:", error);
                btn.disabled = false;
                btn.textContent = "Assinar agora";
                alert("Não foi possível iniciar o pagamento. Tente novamente.");
            }
        };
    </script>
</body>
</html>
