<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - EstoquePro</title>
<link rel="stylesheet" href="index.css?v=1.2">
</head>

<body>

<div class="container">

<h1>EstoquePro</h1>
<p class="sub">Controle inteligente para restaurantes</p>

<input type="email" id="email" placeholder="Seu email">
<input type="password" id="senha" placeholder="Sua senha">

<button onclick="login()">Entrar</button>

<div class="link" onclick="window.location.href='cadastro.html'">
Criar conta
</div>

<div class="link" onclick="resetSenha()">
Esqueci minha senha
</div>

<p id="mensagem"></p>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";

import {
getAuth,
signInWithEmailAndPassword,
sendPasswordResetEmail,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyCkwsmbR683PMT1XoOyEykqJmLCcieQwwU",
authDomain: "controle-de-estoque-fac87.firebaseapp.com",
projectId: "controle-de-estoque-fac87",
storageBucket: "controle-de-estoque-fac87.firebasestorage.app",
messagingSenderId: "931385340836",
appId: "1:931385340836:web:ed3cb1d560127b739b8731"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);


/* LOGIN */

window.login = function(){

let email = document.getElementById("email").value;
let senha = document.getElementById("senha").value;

signInWithEmailAndPassword(auth,email,senha)

.then(()=>{
window.location.href="dashboard.html";
})

.catch(()=>{
document.getElementById("mensagem").innerText="Email ou senha inválidos";
});

}


/* RESET SENHA */

window.resetSenha = function(){

let email = document.getElementById("email").value;

sendPasswordResetEmail(auth,email)

.then(()=>{
alert("Email de recuperação enviado");
})

.catch(()=>{
document.getElementById("mensagem").innerText="Digite um email válido";
});

}


/* SE JÁ ESTIVER LOGADO */

onAuthStateChanged(auth,(user)=>{

if(user){
window.location.href="dashboard.html";
}

});

</script>

</body>

</html>
